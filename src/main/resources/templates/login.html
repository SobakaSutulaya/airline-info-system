<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
  <meta charset="UTF-8">
  <title th:text="${title} ?: 'Login - Airline Info System'">Login - Airline Info System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" th:href="@{/css/app.css}">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      max-width: 400px;
      width: 100%;
      padding: 2rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #667eea;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      border: 1px solid rgba(139, 92, 246, 0.3);
      font-size: 1rem;
      background: #ffffff !important;
      color: #1a202c !important;
      transition: all 0.3s ease;
    }
    
    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
      background: #ffffff !important;
      color: #1a202c !important;
    }
    
    input[type="text"]:hover,
    input[type="password"]:hover {
      border-color: rgba(139, 92, 246, 0.5);
      background: #ffffff !important;
    }
    
    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
      color: #9ca3af !important;
    }

    .btn {
      width: 100%;
      padding: 0.75rem;
      border-radius: 6px;
      border: none;
      background: #667eea;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
    }

    .btn:hover { background: #5568d3; }

    .link {
      text-align: center;
      margin-top: 1rem;
    }

    .link a { color: #667eea; text-decoration: none; }
    .link a:hover { text-decoration: underline; }

    .alert {
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Войти</h1>

  <!-- ошибки логина -->
  <div th:if="${param.error}" class="alert alert-error">
    Неверный логин или пароль
  </div>

  <!-- успешная регистрация -->
  <div th:if="${param.registered}" class="alert alert-success">
    Регистрация прошла успешно. Войдите под своим логином и паролем.
  </div>

  <!-- форма логина: action /login, method post -->
  <form th:action="@{/login}" method="post">
    <div class="form-group">
      <label for="username">Имя пользователя</label>
      <input id="username" name="username" type="text" required autofocus>
    </div>

    <div class="form-group">
      <label for="password">Пароль</label>
      <input id="password" name="password" type="password" required>
    </div>

    <button type="submit" class="btn">Войти</button>
  </form>

  <div class="link">
    <p>Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a></p>
    <p style="margin-top:0.5rem;"><a th:href="@{/}">← На главную</a></p>
  </div>
</div>

</body>
</html>
